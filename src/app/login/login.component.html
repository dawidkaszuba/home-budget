<div fxLayoutAlign="center center" fxFlexFill>
    <mat-card fxFlex="25">
        <mat-toolbar color="primary">Login Page</mat-toolbar>
        <form xLayoutAlign="stretch" fxLayout="column" >
            <mat-form-field>
            <input matInput placeholder="username">
            </mat-form-field>
        
            <mat-form-field>
                <input matInput type="password" placeholder="password">
            </mat-form-field>
            <button mat-raised-button type="submit">Login</button>
        </form>
    </mat-card>    
</div>
