<div fxLayoutAlign="center center" fxFlexFill>
    <mat-card fxFlex="75">
        <mat-toolbar color="primary">Login</mat-toolbar>
        <form xLayoutAlign="stretch" fxLayout="column" >
            <mat-form-field>
            <input [(ngModel)]="username" name="username" matInput placeholder="username">
            </mat-form-field>
        
            <mat-form-field>
                <input [(ngModel)]="password" name="password" matInput type="password" placeholder="password">
            </mat-form-field>
            <button (touch)="getAccessToken()" (click)="getAccessToken()" mat-raised-button type="submit">Login</button>
        </form>
    </mat-card>    
</div>
