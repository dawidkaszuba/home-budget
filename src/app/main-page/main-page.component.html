<div fxLayout="row" fxLayoutAlign="space-around center" >
  <p>Balance: {{currentBalance}}</p>
  <p>Savings: {{currentSavings}}</p>
  <div><p>Expenses: </p>
    <ul *ngFor="let expense of expenses">
    <li>{{expense.amount}} {{expense.note}}</li>
    </ul>
  </div>
</div>

<br>
<p>add expense</p>

<form>
    <p>
      <label>amount</label> 
      <input [(ngModel)]="amount" name="amount">
   </p>
   <p>
     <label>note</label> 
     <input [(ngModel)]="note" name="note">
   </p>
   <p>
     <button>add</button>
   </p>
</form>
