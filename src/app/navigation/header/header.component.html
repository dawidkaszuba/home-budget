<mat-toolbar color="primary">
    <div fxHide.gt-xs>
        <button mat-icon-button (click)="onToggleSidenav()">
            <mat-icon>menu</mat-icon>
        </button>
        
    </div>
    <div>
        <a routerLink="/mainpage">Clear Budget</a>
    </div>
    <div fxFlex fxLayout fxLayoutAlign="end" fxHide.xs>
        <ul fxLayout fxLayoutGap="15px" class="navigation-items">
            <li *ngIf="authService.isAuthenticated()">
                <a routerLink="/mainpage">home</a>
            </li>
            <li *ngIf="authService.isAuthenticated()">
                <a routerLink="addExpense">new expense</a>
            </li>
            <li *ngIf="authService.isAuthenticated()">
                <a routerLink="newincome">new income</a>
            </li>
            <li *ngIf="authService.isAuthenticated()">
                <button  mat-icon-button (click)="logOut()">
                    <mat-icon>power_settings_new</mat-icon>
                </button>
            </li>
            <li *ngIf="!authService.isAuthenticated()">
                <a routerLink="login">
                    <mat-icon>login</mat-icon>
                </a>
            </li> 
        </ul>
    </div>
</mat-toolbar>
